<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Squares</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #playfield {
            width: 400px;
            height: 90vh;
            background-color: #f0f0f0;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .square {
            position: absolute;
            cursor: grab;
            user-select: none;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .square:active {
            cursor: grabbing;
        }

        #controls {
            position: fixed;
            left: 10px;
            top: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            width: 220px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #controls h3 {
            margin: 0 0 10px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
            font-size: 14px;
        }

        #controls h4 {
            margin: 12px 0 6px 0;
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
        }

        .control-group {
            margin-bottom: 8px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .control-group input[type="range"] {
            width: 100%;
        }

        .control-value {
            color: #4af;
            font-family: monospace;
        }

        #box-info {
            position: fixed;
            right: 10px;
            top: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            width: 180px;
        }

        #box-info h3 {
            margin: 0 0 10px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
            font-size: 14px;
        }

        .box-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .box-stat .value {
            color: #4af;
            font-family: monospace;
        }

        .box-preview {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        #test-results {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
        }

        .test-pass { color: #4f4; }
        .test-fail { color: #f44; }
    </style>
</head>
<body>
    <div id="controls">
        <h3>Physics Controls</h3>

        <h4>Global Forces</h4>
        <div class="control-group">
            <label>Gravity <span class="control-value" id="gravity-val">800</span></label>
            <input type="range" id="gravity" min="0" max="2000" value="800">
        </div>
        <div class="control-group">
            <label>Air Friction <span class="control-value" id="friction-val">0.92</span></label>
            <input type="range" id="friction" min="0.8" max="1" step="0.01" value="0.92">
        </div>

        <h4>Collision</h4>
        <div class="control-group">
            <label>Bounce Damping <span class="control-value" id="bounceDamping-val">0.5</span></label>
            <input type="range" id="bounceDamping" min="0" max="1" step="0.05" value="0.5">
        </div>
        <div class="control-group">
            <label>Collision Damping <span class="control-value" id="collisionDamping-val">0.8</span></label>
            <input type="range" id="collisionDamping" min="0" max="1" step="0.05" value="0.8">
        </div>
        <div class="control-group">
            <label>Min Bounce Ratio <span class="control-value" id="minBounceRatio-val">0.3</span></label>
            <input type="range" id="minBounceRatio" min="0" max="0.5" step="0.05" value="0.3">
        </div>

        <h4>Surface</h4>
        <div class="control-group">
            <label>Default Grip <span class="control-value" id="surfaceFriction-val">0.8</span></label>
            <input type="range" id="surfaceFriction" min="0" max="1" step="0.05" value="0.8">
        </div>
    </div>

    <div id="playfield"></div>

    <div id="box-info">
        <h3>Box Properties</h3>
        <div id="box-list"></div>
    </div>

    <div id="test-results"></div>

    <script>
    // ========================================
    // PHYSICS ENGINE (Decoupled from rendering)
    // ========================================
    class PhysicsEngine {
        constructor(config = {}) {
            this.gravity = config.gravity ?? 800;
            this.friction = config.friction ?? 0.92;
            this.bounceDamping = config.bounceDamping ?? 0.5;
            this.collisionDamping = config.collisionDamping ?? 0.8;
            this.velocityThreshold = config.velocityThreshold ?? 5;
            this.minBounceRatio = config.minBounceRatio ?? 0.3;
            this.surfaceFriction = config.surfaceFriction ?? 0.8;
            this.bounds = config.bounds ?? { width: 800, height: 600 };
            this.squares = [];
        }

        addSquare(config) {
            const square = {
                id: config.id ?? this.squares.length,
                name: config.name ?? `Box ${this.squares.length + 1}`,
                size: config.size,
                mass: config.mass ?? config.size,
                surfaceFriction: config.surfaceFriction ?? this.surfaceFriction,
                x: config.x ?? 0,
                y: config.y ?? 0,
                vx: config.vx ?? 0,
                vy: config.vy ?? 0,
                isDragged: false
            };
            this.squares.push(square);
            return square;
        }

        setBounds(width, height) {
            this.bounds = { width, height };
        }

        checkCollision(a, b) {
            return a.x < b.x + b.size &&
                   a.x + a.size > b.x &&
                   a.y < b.y + b.size &&
                   a.y + a.size > b.y;
        }

        getCollisionInfo(a, b) {
            const overlapX = Math.min(a.x + a.size - b.x, b.x + b.size - a.x);
            const overlapY = Math.min(a.y + a.size - b.y, b.y + b.size - a.y);
            const isHorizontal = overlapX < overlapY;

            return {
                overlapX,
                overlapY,
                isHorizontal,
                aLeftOfB: a.x + a.size / 2 < b.x + b.size / 2,
                aAboveB: a.y + a.size / 2 < b.y + b.size / 2
            };
        }

        resolveCollision(a, b) {
            if (!this.checkCollision(a, b)) return false;

            const info = this.getCollisionInfo(a, b);
            const totalMass = a.mass + b.mass;
            const aRatio = b.mass / totalMass;
            const bRatio = a.mass / totalMass;

            if (info.isHorizontal) {
                if (info.aLeftOfB) {
                    a.x -= info.overlapX * aRatio;
                    b.x += info.overlapX * bRatio;
                } else {
                    a.x += info.overlapX * aRatio;
                    b.x -= info.overlapX * bRatio;
                }

                const normalDir = info.aLeftOfB ? 1 : -1;
                const relVelAlongNormal = (a.vx - b.vx) * normalDir;

                if (relVelAlongNormal > 0) {
                    const j = -(1 + this.collisionDamping) * relVelAlongNormal / (1/a.mass + 1/b.mass);
                    a.vx += (j / a.mass) * normalDir;
                    b.vx -= (j / b.mass) * normalDir;
                }
            } else {
                if (info.aAboveB) {
                    a.y -= info.overlapY * aRatio;
                    b.y += info.overlapY * bRatio;
                } else {
                    a.y += info.overlapY * aRatio;
                    b.y -= info.overlapY * bRatio;
                }

                const normalDir = info.aAboveB ? 1 : -1;
                const relVelAlongNormal = (a.vy - b.vy) * normalDir;

                if (relVelAlongNormal > 0) {
                    const j = -(1 + this.collisionDamping) * relVelAlongNormal / (1/a.mass + 1/b.mass);
                    a.vy += (j / a.mass) * normalDir;
                    b.vy -= (j / b.mass) * normalDir;

                    const minBounce = relVelAlongNormal * this.minBounceRatio * this.collisionDamping;
                    if (a.vy * normalDir >= 0) {
                        a.vy = -minBounce * normalDir;
                    }
                    if (b.vy * normalDir <= 0) {
                        b.vy = minBounce * normalDir;
                    }
                }
            }

            return true;
        }

        constrainToBounds(square) {
            const maxX = this.bounds.width - square.size;
            const maxY = this.bounds.height - square.size;
            let hitBoundary = false;

            if (square.x < 0) {
                square.x = 0;
                square.vx = -square.vx * this.bounceDamping;
                hitBoundary = true;
            } else if (square.x > maxX) {
                square.x = maxX;
                square.vx = -square.vx * this.bounceDamping;
                hitBoundary = true;
            }

            if (square.y < 0) {
                square.y = 0;
                square.vy = -square.vy * this.bounceDamping;
                hitBoundary = true;
            } else if (square.y > maxY) {
                square.y = maxY;
                square.vy = -square.vy * this.bounceDamping;
                hitBoundary = true;
            }

            return hitBoundary;
        }

        applyVelocityThreshold(square) {
            if (Math.abs(square.vx) < this.velocityThreshold) square.vx = 0;
            if (Math.abs(square.vy) < this.velocityThreshold) square.vy = 0;
        }

        isRestingOn(top, bottom) {
            const overlapX = Math.min(top.x + top.size, bottom.x + bottom.size) - Math.max(top.x, bottom.x);
            if (overlapX <= 0) return false;

            const topBottom = top.y + top.size;
            const bottomTop = bottom.y;
            const gap = Math.abs(topBottom - bottomTop);

            return gap < 2 && top.y < bottom.y;
        }

        applySurfaceFriction(dt) {
            for (const bottom of this.squares) {
                if (Math.abs(bottom.vx) < 1 && !bottom.isDragged) continue;

                for (const top of this.squares) {
                    if (top === bottom) continue;
                    if (top.isDragged) continue;

                    if (this.isRestingOn(top, bottom)) {
                        const frictionCoef = Math.min(top.surfaceFriction, bottom.surfaceFriction);

                        if (bottom.isDragged) {
                            top.vx += (bottom.vx - top.vx) * frictionCoef;
                        } else {
                            const transfer = (bottom.vx - top.vx) * frictionCoef * dt * 10;
                            top.vx += transfer;
                        }
                    }
                }
            }
        }

        step(dt) {
            this.applySurfaceFriction(dt);

            for (const square of this.squares) {
                if (square.isDragged) continue;
                square.vy += this.gravity * dt;
                square.vx *= this.friction;
                square.x += square.vx * dt;
                square.y += square.vy * dt;
            }

            for (const square of this.squares) {
                this.constrainToBounds(square);
            }

            for (let iter = 0; iter < 4; iter++) {
                for (let i = 0; i < this.squares.length; i++) {
                    for (let j = i + 1; j < this.squares.length; j++) {
                        this.resolveCollision(this.squares[i], this.squares[j]);
                    }
                }
            }

            for (const square of this.squares) {
                this.constrainToBounds(square);
                this.applyVelocityThreshold(square);
            }
        }
    }

    // ========================================
    // VISUALIZATION (Browser rendering)
    // ========================================
    class Renderer {
        constructor(engine, container) {
            this.engine = engine;
            this.container = container;
            this.elements = new Map();
            this.draggedSquare = null;
            this.dragOffset = { x: 0, y: 0 };
            this.lastMouse = { x: 0, y: 0 };
            this.lastTime = 0;
        }

        createSquareElement(square, color) {
            const el = document.createElement('div');
            el.className = 'square';
            el.style.width = square.size + 'px';
            el.style.height = square.size + 'px';
            el.style.backgroundColor = color;
            el.innerHTML = `<span>${square.name}</span>`;
            this.container.appendChild(el);

            this.elements.set(square.id, el);

            el.addEventListener('mousedown', (e) => this.onMouseDown(e, square));
            el.addEventListener('touchstart', (e) => this.onTouchStart(e, square), { passive: false });

            return el;
        }

        updatePositions() {
            for (const square of this.engine.squares) {
                const el = this.elements.get(square.id);
                if (el) {
                    el.style.left = square.x + 'px';
                    el.style.top = square.y + 'px';
                }
            }
        }

        getContainerOffset() {
            const rect = this.container.getBoundingClientRect();
            return { x: rect.left, y: rect.top };
        }

        onMouseDown(e, square) {
            const offset = this.getContainerOffset();
            this.draggedSquare = square;
            square.isDragged = true;
            this.dragOffset.x = e.clientX - offset.x - square.x;
            this.dragOffset.y = e.clientY - offset.y - square.y;
            this.lastMouse.x = e.clientX;
            this.lastMouse.y = e.clientY;
            this.lastTime = performance.now();
            square.vx = 0;
            square.vy = 0;
            this.elements.get(square.id).style.zIndex = Date.now();
        }

        onMouseMove(e) {
            if (!this.draggedSquare) return;

            const offset = this.getContainerOffset();
            const square = this.draggedSquare;
            const now = performance.now();
            const dt = (now - this.lastTime) / 1000;

            if (dt > 0) {
                square.vx = (e.clientX - this.lastMouse.x) / dt;
                square.vy = (e.clientY - this.lastMouse.y) / dt;
            }

            square.x = e.clientX - offset.x - this.dragOffset.x;
            square.y = e.clientY - offset.y - this.dragOffset.y;

            this.engine.constrainToBounds(square);

            this.lastMouse.x = e.clientX;
            this.lastMouse.y = e.clientY;
            this.lastTime = now;
        }

        onMouseUp() {
            if (this.draggedSquare) {
                this.draggedSquare.isDragged = false;
                this.draggedSquare = null;
            }
        }

        onTouchStart(e, square) {
            e.preventDefault();
            const touch = e.touches[0];
            const offset = this.getContainerOffset();
            this.draggedSquare = square;
            square.isDragged = true;
            this.dragOffset.x = touch.clientX - offset.x - square.x;
            this.dragOffset.y = touch.clientY - offset.y - square.y;
            this.lastMouse.x = touch.clientX;
            this.lastMouse.y = touch.clientY;
            this.lastTime = performance.now();
            square.vx = 0;
            square.vy = 0;
            this.elements.get(square.id).style.zIndex = Date.now();
        }

        onTouchMove(e) {
            if (!this.draggedSquare) return;
            e.preventDefault();

            const touch = e.touches[0];
            const offset = this.getContainerOffset();
            const square = this.draggedSquare;
            const now = performance.now();
            const dt = (now - this.lastTime) / 1000;

            if (dt > 0) {
                square.vx = (touch.clientX - this.lastMouse.x) / dt;
                square.vy = (touch.clientY - this.lastMouse.y) / dt;
            }

            square.x = touch.clientX - offset.x - this.dragOffset.x;
            square.y = touch.clientY - offset.y - this.dragOffset.y;

            this.engine.constrainToBounds(square);

            this.lastMouse.x = touch.clientX;
            this.lastMouse.y = touch.clientY;
            this.lastTime = now;
        }

        onTouchEnd() {
            if (this.draggedSquare) {
                this.draggedSquare.isDragged = false;
                this.draggedSquare = null;
            }
        }

        setupEventListeners() {
            document.addEventListener('mousemove', (e) => this.onMouseMove(e));
            document.addEventListener('mouseup', () => this.onMouseUp());
            document.addEventListener('touchmove', (e) => this.onTouchMove(e), { passive: false });
            document.addEventListener('touchend', () => this.onTouchEnd());
        }
    }

    // ========================================
    // MAIN
    // ========================================

    const playfield = document.getElementById('playfield');
    const playfieldRect = playfield.getBoundingClientRect();

    // Initialize physics engine
    const engine = new PhysicsEngine({
        gravity: 800,
        friction: 0.92,
        bounceDamping: 0.5,
        collisionDamping: 0.8,
        velocityThreshold: 5,
        bounds: { width: 400, height: playfieldRect.height }
    });

    // Unique box configurations - each has different size, mass, and grip
    const squareConfigs = [
        {
            name: 'Heavy',
            size: 80,
            mass: 200,          // Very heavy for its size
            surfaceFriction: 0.9, // High grip
            color: '#1a5fb4',   // Deep blue
            x: 160, y: 50
        },
        {
            name: 'Bouncy',
            size: 60,
            mass: 40,           // Light
            surfaceFriction: 0.5, // Medium grip
            color: '#e01b24',   // Red
            x: 50, y: 120
        },
        {
            name: 'Slick',
            size: 70,
            mass: 70,           // Normal weight
            surfaceFriction: 0.1, // Very slippery (ice-like)
            color: '#33d17a',   // Green
            x: 280, y: 100
        },
        {
            name: 'Tiny',
            size: 40,
            mass: 20,           // Very light
            surfaceFriction: 0.95, // Very grippy (rubber-like)
            color: '#9141ac',   // Purple
            x: 100, y: 200
        },
        {
            name: 'Big',
            size: 100,
            mass: 100,          // Proportional
            surfaceFriction: 0.7, // Good grip
            color: '#ff7800',   // Orange
            x: 200, y: 180
        },
    ];

    // Create renderer
    const renderer = new Renderer(engine, playfield);
    renderer.setupEventListeners();

    // Add squares to engine and create visual elements
    for (const config of squareConfigs) {
        const square = engine.addSquare(config);
        renderer.createSquareElement(square, config.color);
    }

    // Populate box info panel
    const boxList = document.getElementById('box-list');
    boxList.innerHTML = squareConfigs.map(c => `
        <div style="margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #333;">
            <div><span class="box-preview" style="background: ${c.color}"></span><strong>${c.name}</strong></div>
            <div class="box-stat"><span>Size:</span><span class="value">${c.size}px</span></div>
            <div class="box-stat"><span>Mass:</span><span class="value">${c.mass}</span></div>
            <div class="box-stat"><span>Grip:</span><span class="value">${(c.surfaceFriction * 100).toFixed(0)}%</span></div>
        </div>
    `).join('');

    // Setup dev controls
    const controls = ['gravity', 'friction', 'bounceDamping', 'collisionDamping', 'minBounceRatio', 'surfaceFriction'];

    controls.forEach(name => {
        const slider = document.getElementById(name);
        const valueDisplay = document.getElementById(name + '-val');

        slider.addEventListener('input', () => {
            const value = parseFloat(slider.value);
            engine[name] = value;
            valueDisplay.textContent = value.toFixed(2);
        });
    });

    // Update bounds on resize
    window.addEventListener('resize', () => {
        const rect = playfield.getBoundingClientRect();
        engine.setBounds(rect.width, rect.height);
    });

    // Animation loop
    let lastFrameTime = performance.now();

    function gameLoop(currentTime) {
        const dt = Math.min((currentTime - lastFrameTime) / 1000, 0.05);
        lastFrameTime = currentTime;

        engine.step(dt);
        renderer.updatePositions();

        requestAnimationFrame(gameLoop);
    }

    // Run simple validation
    const resultsDiv = document.getElementById('test-results');
    resultsDiv.innerHTML = '<span class="test-pass">✓ Engine loaded</span><br><span class="test-pass">✓ ' + engine.squares.length + ' boxes created</span>';
    setTimeout(() => { resultsDiv.style.display = 'none'; }, 3000);

    requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
