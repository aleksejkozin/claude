<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Squares</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background-color: #f0f0f0;
        }

        .square {
            position: absolute;
            cursor: grab;
            user-select: none;
        }

        .square:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <script>
        // Square configurations
        const squareConfigs = [
            { size: 120, color: '#0066cc' },
            { size: 80, color: '#cc3300' },
            { size: 100, color: '#339933' },
            { size: 60, color: '#9933cc' },
            { size: 90, color: '#ff9900' },
        ];

        // Physics constants
        const gravity = 800;
        const friction = 0.92;
        const bounceDamping = 0.5;
        const collisionDamping = 0.7;
        const velocityThreshold = 5;

        // All squares
        const squares = [];

        // Drag state
        let draggedSquare = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let lastTime = 0;

        // Create squares
        function createSquares() {
            squareConfigs.forEach((config, index) => {
                const element = document.createElement('div');
                element.className = 'square';
                element.style.width = config.size + 'px';
                element.style.height = config.size + 'px';
                element.style.backgroundColor = config.color;
                document.body.appendChild(element);

                const square = {
                    element: element,
                    size: config.size,
                    mass: config.size * config.size,
                    x: 100 + index * 130,
                    y: 50 + index * 80,
                    vx: 0,
                    vy: 0
                };

                squares.push(square);
                updateSquarePosition(square);

                // Mouse events
                element.addEventListener('mousedown', (e) => onMouseDown(e, square));

                // Touch events
                element.addEventListener('touchstart', (e) => onTouchStart(e, square), { passive: false });
            });
        }

        function updateSquarePosition(square) {
            square.element.style.left = square.x + 'px';
            square.element.style.top = square.y + 'px';
        }

        // Constrain to screen boundaries
        function constrainToBounds(square) {
            const maxX = window.innerWidth - square.size;
            const maxY = window.innerHeight - square.size;

            if (square.x < 0) {
                square.x = 0;
                square.vx = -square.vx * bounceDamping;
                if (Math.abs(square.vx) < velocityThreshold) square.vx = 0;
            } else if (square.x > maxX) {
                square.x = maxX;
                square.vx = -square.vx * bounceDamping;
                if (Math.abs(square.vx) < velocityThreshold) square.vx = 0;
            }

            if (square.y < 0) {
                square.y = 0;
                square.vy = -square.vy * bounceDamping;
                if (Math.abs(square.vy) < velocityThreshold) square.vy = 0;
            } else if (square.y > maxY) {
                square.y = maxY;
                square.vy = -square.vy * bounceDamping;
                if (Math.abs(square.vy) < velocityThreshold) square.vy = 0;
            }
        }

        // Check collision between two squares (AABB)
        function checkCollision(a, b) {
            return a.x < b.x + b.size &&
                   a.x + a.size > b.x &&
                   a.y < b.y + b.size &&
                   a.y + a.size > b.y;
        }

        // Resolve collision between two squares
        function resolveCollision(a, b) {
            // Calculate overlap on each axis
            const overlapX = Math.min(a.x + a.size - b.x, b.x + b.size - a.x);
            const overlapY = Math.min(a.y + a.size - b.y, b.y + b.size - a.y);

            const totalMass = a.mass + b.mass;
            const aRatio = b.mass / totalMass;
            const bRatio = a.mass / totalMass;

            // Determine collision axis (smallest overlap)
            if (overlapX < overlapY) {
                // Horizontal collision - fully separate
                if (a.x < b.x) {
                    a.x -= overlapX * aRatio;
                    b.x += overlapX * bRatio;
                } else {
                    a.x += overlapX * aRatio;
                    b.x -= overlapX * bRatio;
                }

                // Only exchange velocities if moving toward each other
                const relativeVx = a.vx - b.vx;
                if ((a.x < b.x && relativeVx > 0) || (a.x > b.x && relativeVx < 0)) {
                    const newVxA = ((a.mass - b.mass) * a.vx + 2 * b.mass * b.vx) / totalMass;
                    const newVxB = ((b.mass - a.mass) * b.vx + 2 * a.mass * a.vx) / totalMass;
                    a.vx = newVxA * collisionDamping;
                    b.vx = newVxB * collisionDamping;
                }
            } else {
                // Vertical collision - fully separate
                if (a.y < b.y) {
                    a.y -= overlapY * aRatio;
                    b.y += overlapY * bRatio;
                } else {
                    a.y += overlapY * aRatio;
                    b.y -= overlapY * bRatio;
                }

                // Only exchange velocities if moving toward each other
                const relativeVy = a.vy - b.vy;
                if ((a.y < b.y && relativeVy > 0) || (a.y > b.y && relativeVy < 0)) {
                    const newVyA = ((a.mass - b.mass) * a.vy + 2 * b.mass * b.vy) / totalMass;
                    const newVyB = ((b.mass - a.mass) * b.vy + 2 * a.mass * a.vy) / totalMass;
                    a.vy = newVyA * collisionDamping;
                    b.vy = newVyB * collisionDamping;
                }
            }
        }

        // Physics update loop
        let lastFrameTime = performance.now();

        function physicsLoop(currentTime) {
            const dt = Math.min((currentTime - lastFrameTime) / 1000, 0.05);
            lastFrameTime = currentTime;

            // Update each square
            squares.forEach(square => {
                if (square !== draggedSquare) {
                    // Apply gravity
                    square.vy += gravity * dt;

                    // Apply friction (more on horizontal for ground feel)
                    square.vx *= friction;

                    // Update position
                    square.x += square.vx * dt;
                    square.y += square.vy * dt;

                    // Zero out tiny velocities to prevent jitter
                    if (Math.abs(square.vx) < velocityThreshold) square.vx = 0;
                    if (Math.abs(square.vy) < velocityThreshold && square.vy > 0) square.vy = 0;
                }

                // Constrain to bounds
                constrainToBounds(square);
            });

            // Run multiple collision iterations to stabilize stacking
            for (let iter = 0; iter < 3; iter++) {
                for (let i = 0; i < squares.length; i++) {
                    for (let j = i + 1; j < squares.length; j++) {
                        if (checkCollision(squares[i], squares[j])) {
                            resolveCollision(squares[i], squares[j]);
                        }
                    }
                }
            }

            // Final bounds check after collision resolution
            squares.forEach(constrainToBounds);

            // Update DOM
            squares.forEach(updateSquarePosition);

            requestAnimationFrame(physicsLoop);
        }

        // Mouse events
        function onMouseDown(e, square) {
            draggedSquare = square;
            dragOffsetX = e.clientX - square.x;
            dragOffsetY = e.clientY - square.y;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            lastTime = performance.now();
            square.vx = 0;
            square.vy = 0;

            // Bring to front
            square.element.style.zIndex = Date.now();
        }

        function onMouseMove(e) {
            if (!draggedSquare) return;

            const currentTime = performance.now();
            const dt = (currentTime - lastTime) / 1000;

            if (dt > 0) {
                draggedSquare.vx = (e.clientX - lastMouseX) / dt;
                draggedSquare.vy = (e.clientY - lastMouseY) / dt;
            }

            draggedSquare.x = e.clientX - dragOffsetX;
            draggedSquare.y = e.clientY - dragOffsetY;

            constrainToBounds(draggedSquare);
            updateSquarePosition(draggedSquare);

            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            lastTime = currentTime;
        }

        function onMouseUp() {
            draggedSquare = null;
        }

        // Touch events
        function onTouchStart(e, square) {
            e.preventDefault();
            const touch = e.touches[0];
            draggedSquare = square;
            dragOffsetX = touch.clientX - square.x;
            dragOffsetY = touch.clientY - square.y;
            lastMouseX = touch.clientX;
            lastMouseY = touch.clientY;
            lastTime = performance.now();
            square.vx = 0;
            square.vy = 0;

            square.element.style.zIndex = Date.now();
        }

        function onTouchMove(e) {
            if (!draggedSquare) return;
            e.preventDefault();

            const touch = e.touches[0];
            const currentTime = performance.now();
            const dt = (currentTime - lastTime) / 1000;

            if (dt > 0) {
                draggedSquare.vx = (touch.clientX - lastMouseX) / dt;
                draggedSquare.vy = (touch.clientY - lastMouseY) / dt;
            }

            draggedSquare.x = touch.clientX - dragOffsetX;
            draggedSquare.y = touch.clientY - dragOffsetY;

            constrainToBounds(draggedSquare);
            updateSquarePosition(draggedSquare);

            lastMouseX = touch.clientX;
            lastMouseY = touch.clientY;
            lastTime = currentTime;
        }

        function onTouchEnd() {
            draggedSquare = null;
        }

        // Global event listeners
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.addEventListener('touchmove', onTouchMove, { passive: false });
        document.addEventListener('touchend', onTouchEnd);

        // Handle window resize
        window.addEventListener('resize', () => {
            squares.forEach(constrainToBounds);
            squares.forEach(updateSquarePosition);
        });

        // Initialize
        createSquares();
        requestAnimationFrame(physicsLoop);
    </script>
</body>
</html>
