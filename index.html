<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #playfield {
            width: 800px;
            height: 90vh;
            background-color: #f0f0f0;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .shape {
            position: absolute;
            cursor: grab;
            user-select: none;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: rgba(255,255,255,0.8);
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
            text-align: center;
            line-height: 1.1;
        }

        .shape:active {
            cursor: grabbing;
        }

        #controls {
            position: fixed;
            left: 10px;
            top: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            width: 220px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #controls h3 {
            margin: 0 0 10px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
            font-size: 14px;
        }

        #controls h4 {
            margin: 12px 0 6px 0;
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
        }

        .control-group {
            margin-bottom: 8px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .control-group input[type="range"] {
            width: 100%;
        }

        .control-value {
            color: #4af;
            font-family: monospace;
        }

        #shape-info {
            position: fixed;
            right: 10px;
            top: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 11px;
            width: 200px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #shape-info h3 {
            margin: 0 0 10px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
            font-size: 14px;
        }

        .shape-item {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }

        .shape-item:last-child {
            border-bottom: none;
        }

        .shape-header {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .shape-preview {
            border-radius: 2px;
            display: inline-block;
            margin-right: 8px;
        }

        .shape-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            font-size: 10px;
            color: #888;
        }

        .shape-stats span {
            color: #4af;
        }

        #test-results {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
        }

        .test-pass { color: #4f4; }
        .test-fail { color: #f44; }
    </style>
</head>
<body>
    <div id="controls">
        <h3>Physics Controls</h3>

        <h4>Global Forces</h4>
        <div class="control-group">
            <label>Gravity <span class="control-value" id="gravity-val">1600</span></label>
            <input type="range" id="gravity" min="0" max="3200" value="1600">
        </div>
        <div class="control-group">
            <label>Air Friction <span class="control-value" id="friction-val">0.92</span></label>
            <input type="range" id="friction" min="0.8" max="1" step="0.01" value="0.92">
        </div>

        <h4>Collision</h4>
        <div class="control-group">
            <label>Bounce Damping <span class="control-value" id="bounceDamping-val">0.5</span></label>
            <input type="range" id="bounceDamping" min="0" max="1" step="0.05" value="0.5">
        </div>
        <div class="control-group">
            <label>Collision Damping <span class="control-value" id="collisionDamping-val">0.8</span></label>
            <input type="range" id="collisionDamping" min="0" max="1" step="0.05" value="0.8">
        </div>
        <div class="control-group">
            <label>Min Bounce Ratio <span class="control-value" id="minBounceRatio-val">0.3</span></label>
            <input type="range" id="minBounceRatio" min="0" max="0.5" step="0.05" value="0.3">
        </div>

        <h4>Surface</h4>
        <div class="control-group">
            <label>Default Grip <span class="control-value" id="surfaceFriction-val">1.00</span></label>
            <input type="range" id="surfaceFriction" min="0" max="1" step="0.05" value="1.0">
        </div>
    </div>

    <div id="playfield"></div>

    <div id="shape-info">
        <h3>Shapes</h3>
        <div id="shape-list"></div>
    </div>

    <div id="test-results"></div>

    <script>
    // ========================================
    // PHYSICS ENGINE (Supports rectangles)
    // ========================================
    class PhysicsEngine {
        constructor(config = {}) {
            this.gravity = config.gravity ?? 800;
            this.friction = config.friction ?? 0.92;
            this.bounceDamping = config.bounceDamping ?? 0.5;
            this.collisionDamping = config.collisionDamping ?? 0.8;
            this.velocityThreshold = config.velocityThreshold ?? 5;
            this.minBounceRatio = config.minBounceRatio ?? 0.3;
            this.surfaceFriction = config.surfaceFriction ?? 1.0;
            this.bounds = config.bounds ?? { width: 800, height: 600 };
            this.bodies = [];
        }

        addBody(config) {
            const body = {
                id: config.id ?? this.bodies.length,
                name: config.name ?? `Shape ${this.bodies.length + 1}`,
                width: config.width ?? config.size ?? 50,
                height: config.height ?? config.size ?? 50,
                mass: config.mass ?? (config.width ?? config.size ?? 50) * (config.height ?? config.size ?? 50) / 50,
                surfaceFriction: config.surfaceFriction ?? this.surfaceFriction,
                x: config.x ?? 0,
                y: config.y ?? 0,
                vx: config.vx ?? 0,
                vy: config.vy ?? 0,
                isDragged: false
            };
            this.bodies.push(body);
            return body;
        }

        setBounds(width, height) {
            this.bounds = { width, height };
        }

        checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        getCollisionInfo(a, b) {
            const overlapX = Math.min(a.x + a.width - b.x, b.x + b.width - a.x);
            const overlapY = Math.min(a.y + a.height - b.y, b.y + b.height - a.y);
            const isHorizontal = overlapX < overlapY;

            return {
                overlapX,
                overlapY,
                isHorizontal,
                aLeftOfB: a.x + a.width / 2 < b.x + b.width / 2,
                aAboveB: a.y + a.height / 2 < b.y + b.height / 2
            };
        }

        resolveCollision(a, b) {
            if (!this.checkCollision(a, b)) return false;

            const info = this.getCollisionInfo(a, b);
            const totalMass = a.mass + b.mass;
            const aRatio = b.mass / totalMass;
            const bRatio = a.mass / totalMass;

            if (info.isHorizontal) {
                if (info.aLeftOfB) {
                    a.x -= info.overlapX * aRatio;
                    b.x += info.overlapX * bRatio;
                } else {
                    a.x += info.overlapX * aRatio;
                    b.x -= info.overlapX * bRatio;
                }

                const normalDir = info.aLeftOfB ? 1 : -1;
                const relVelAlongNormal = (a.vx - b.vx) * normalDir;

                if (relVelAlongNormal > 0) {
                    const j = -(1 + this.collisionDamping) * relVelAlongNormal / (1/a.mass + 1/b.mass);
                    a.vx += (j / a.mass) * normalDir;
                    b.vx -= (j / b.mass) * normalDir;
                }
            } else {
                if (info.aAboveB) {
                    a.y -= info.overlapY * aRatio;
                    b.y += info.overlapY * bRatio;
                } else {
                    a.y += info.overlapY * aRatio;
                    b.y -= info.overlapY * bRatio;
                }

                const normalDir = info.aAboveB ? 1 : -1;
                const relVelAlongNormal = (a.vy - b.vy) * normalDir;

                if (relVelAlongNormal > 0) {
                    const j = -(1 + this.collisionDamping) * relVelAlongNormal / (1/a.mass + 1/b.mass);
                    a.vy += (j / a.mass) * normalDir;
                    b.vy -= (j / b.mass) * normalDir;

                    const minBounce = relVelAlongNormal * this.minBounceRatio * this.collisionDamping;
                    if (a.vy * normalDir >= 0) {
                        a.vy = -minBounce * normalDir;
                    }
                    if (b.vy * normalDir <= 0) {
                        b.vy = minBounce * normalDir;
                    }
                }
            }

            return true;
        }

        constrainToBounds(body) {
            const maxX = this.bounds.width - body.width;
            const maxY = this.bounds.height - body.height;
            let hitBoundary = false;

            if (body.x < 0) {
                body.x = 0;
                body.vx = -body.vx * this.bounceDamping;
                hitBoundary = true;
            } else if (body.x > maxX) {
                body.x = maxX;
                body.vx = -body.vx * this.bounceDamping;
                hitBoundary = true;
            }

            if (body.y < 0) {
                body.y = 0;
                body.vy = -body.vy * this.bounceDamping;
                hitBoundary = true;
            } else if (body.y > maxY) {
                body.y = maxY;
                body.vy = -body.vy * this.bounceDamping;
                hitBoundary = true;
            }

            return hitBoundary;
        }

        applyVelocityThreshold(body) {
            if (Math.abs(body.vx) < this.velocityThreshold) body.vx = 0;
            if (Math.abs(body.vy) < this.velocityThreshold) body.vy = 0;
        }

        isRestingOn(top, bottom) {
            const overlapX = Math.min(top.x + top.width, bottom.x + bottom.width) - Math.max(top.x, bottom.x);
            if (overlapX <= 0) return false;

            const topBottom = top.y + top.height;
            const bottomTop = bottom.y;
            const gap = Math.abs(topBottom - bottomTop);

            return gap < 2 && top.y < bottom.y;
        }

        applySurfaceFriction(dt) {
            // When dragging, directly set velocity for resting objects (recursive)
            const applyDragToStack = (bottom) => {
                for (const top of this.bodies) {
                    if (top === bottom || top.isDragged) continue;
                    if (this.isRestingOn(top, bottom)) {
                        const frictionCoef = Math.min(top.surfaceFriction, bottom.surfaceFriction);
                        // Direct velocity transfer for dragged stacks
                        top.vx = bottom.vx * frictionCoef;
                        top.x += (bottom.x - (top.x - (top.x - bottom.x))) * 0;  // Keep position stable
                        // Recursively apply to objects resting on top
                        applyDragToStack(top);
                    }
                }
            };

            for (const body of this.bodies) {
                if (body.isDragged) {
                    applyDragToStack(body);
                }
            }

            // Normal friction transfer for non-dragged movement
            for (const bottom of this.bodies) {
                if (bottom.isDragged || Math.abs(bottom.vx) < 1) continue;

                for (const top of this.bodies) {
                    if (top === bottom || top.isDragged) continue;

                    if (this.isRestingOn(top, bottom)) {
                        const frictionCoef = Math.min(top.surfaceFriction, bottom.surfaceFriction);
                        const transfer = (bottom.vx - top.vx) * frictionCoef * dt * 10;
                        top.vx += transfer;
                    }
                }
            }
        }

        step(dt) {
            this.applySurfaceFriction(dt);

            for (const body of this.bodies) {
                if (body.isDragged) continue;
                body.vy += this.gravity * dt;
                body.vx *= this.friction;
                body.x += body.vx * dt;
                body.y += body.vy * dt;
            }

            for (const body of this.bodies) {
                this.constrainToBounds(body);
            }

            for (let iter = 0; iter < 4; iter++) {
                for (let i = 0; i < this.bodies.length; i++) {
                    for (let j = i + 1; j < this.bodies.length; j++) {
                        this.resolveCollision(this.bodies[i], this.bodies[j]);
                    }
                }
            }

            for (const body of this.bodies) {
                this.constrainToBounds(body);
                this.applyVelocityThreshold(body);
            }
        }
    }

    // ========================================
    // VISUALIZATION
    // ========================================
    class Renderer {
        constructor(engine, container) {
            this.engine = engine;
            this.container = container;
            this.elements = new Map();
            this.draggedBody = null;
            this.dragOffset = { x: 0, y: 0 };
            this.lastMouse = { x: 0, y: 0 };
            this.lastTime = 0;
        }

        createBodyElement(body, color) {
            const el = document.createElement('div');
            el.className = 'shape';
            el.style.width = body.width + 'px';
            el.style.height = body.height + 'px';
            el.style.backgroundColor = color;
            el.innerHTML = `<span>${body.name}</span>`;
            this.container.appendChild(el);

            this.elements.set(body.id, el);

            el.addEventListener('mousedown', (e) => this.onMouseDown(e, body));
            el.addEventListener('touchstart', (e) => this.onTouchStart(e, body), { passive: false });

            return el;
        }

        updatePositions() {
            for (const body of this.engine.bodies) {
                const el = this.elements.get(body.id);
                if (el) {
                    el.style.left = body.x + 'px';
                    el.style.top = body.y + 'px';
                }
            }
        }

        getContainerOffset() {
            const rect = this.container.getBoundingClientRect();
            return { x: rect.left, y: rect.top };
        }

        onMouseDown(e, body) {
            const offset = this.getContainerOffset();
            this.draggedBody = body;
            body.isDragged = true;
            this.dragOffset.x = e.clientX - offset.x - body.x;
            this.dragOffset.y = e.clientY - offset.y - body.y;
            this.lastMouse.x = e.clientX;
            this.lastMouse.y = e.clientY;
            this.lastTime = performance.now();
            body.vx = 0;
            body.vy = 0;
            this.elements.get(body.id).style.zIndex = Date.now();
        }

        onMouseMove(e) {
            if (!this.draggedBody) return;

            const offset = this.getContainerOffset();
            const body = this.draggedBody;
            const now = performance.now();
            const dt = (now - this.lastTime) / 1000;

            if (dt > 0) {
                body.vx = (e.clientX - this.lastMouse.x) / dt;
                body.vy = (e.clientY - this.lastMouse.y) / dt;
            }

            body.x = e.clientX - offset.x - this.dragOffset.x;
            body.y = e.clientY - offset.y - this.dragOffset.y;

            this.engine.constrainToBounds(body);

            this.lastMouse.x = e.clientX;
            this.lastMouse.y = e.clientY;
            this.lastTime = now;
        }

        onMouseUp() {
            if (this.draggedBody) {
                this.draggedBody.isDragged = false;
                this.draggedBody = null;
            }
        }

        onTouchStart(e, body) {
            e.preventDefault();
            const touch = e.touches[0];
            const offset = this.getContainerOffset();
            this.draggedBody = body;
            body.isDragged = true;
            this.dragOffset.x = touch.clientX - offset.x - body.x;
            this.dragOffset.y = touch.clientY - offset.y - body.y;
            this.lastMouse.x = touch.clientX;
            this.lastMouse.y = touch.clientY;
            this.lastTime = performance.now();
            body.vx = 0;
            body.vy = 0;
            this.elements.get(body.id).style.zIndex = Date.now();
        }

        onTouchMove(e) {
            if (!this.draggedBody) return;
            e.preventDefault();

            const touch = e.touches[0];
            const offset = this.getContainerOffset();
            const body = this.draggedBody;
            const now = performance.now();
            const dt = (now - this.lastTime) / 1000;

            if (dt > 0) {
                body.vx = (touch.clientX - this.lastMouse.x) / dt;
                body.vy = (touch.clientY - this.lastMouse.y) / dt;
            }

            body.x = touch.clientX - offset.x - this.dragOffset.x;
            body.y = touch.clientY - offset.y - this.dragOffset.y;

            this.engine.constrainToBounds(body);

            this.lastMouse.x = touch.clientX;
            this.lastMouse.y = touch.clientY;
            this.lastTime = now;
        }

        onTouchEnd() {
            if (this.draggedBody) {
                this.draggedBody.isDragged = false;
                this.draggedBody = null;
            }
        }

        setupEventListeners() {
            document.addEventListener('mousemove', (e) => this.onMouseMove(e));
            document.addEventListener('mouseup', () => this.onMouseUp());
            document.addEventListener('touchmove', (e) => this.onTouchMove(e), { passive: false });
            document.addEventListener('touchend', () => this.onTouchEnd());
        }
    }

    // ========================================
    // MAIN
    // ========================================

    const playfield = document.getElementById('playfield');
    const playfieldRect = playfield.getBoundingClientRect();

    const engine = new PhysicsEngine({
        gravity: 1600,
        friction: 0.92,
        bounceDamping: 0.5,
        collisionDamping: 0.8,
        velocityThreshold: 5,
        bounds: { width: 800, height: playfieldRect.height }
    });

    // Fun variety of shapes - all with perfect grip (1.0)
    const shapeConfigs = [
        // Boxes
        {
            name: 'Heavy',
            width: 70, height: 70,
            mass: 180,
            surfaceFriction: 1.0,
            color: '#1a5fb4',
            x: 265, y: 50
        },
        {
            name: 'Bouncy',
            width: 50, height: 50,
            mass: 30,
            surfaceFriction: 1.0,
            color: '#e01b24',
            x: 150, y: 100
        },

        // Vertical bars (tall)
        {
            name: 'Tower',
            width: 30, height: 120,
            mass: 100,
            surfaceFriction: 1.0,
            color: '#9141ac',
            x: 500, y: 80
        },
        {
            name: 'Pillar',
            width: 25, height: 80,
            mass: 60,
            surfaceFriction: 1.0,
            color: '#613583',
            x: 200, y: 150
        },

        // Horizontal bars (wide)
        {
            name: 'Plank',
            width: 140, height: 25,
            mass: 90,
            surfaceFriction: 1.0,
            color: '#33d17a',
            x: 330, y: 200
        },
        {
            name: 'Slick Bar',
            width: 100, height: 20,
            mass: 50,
            surfaceFriction: 1.0,
            color: '#2ec27e',
            x: 120, y: 250
        },

        // Bricks
        {
            name: 'Brick 1',
            width: 60, height: 30,
            mass: 45,
            surfaceFriction: 1.0,
            color: '#c64600',
            x: 140, y: 300
        },
        {
            name: 'Brick 2',
            width: 60, height: 30,
            mass: 45,
            surfaceFriction: 1.0,
            color: '#a51d2d',
            x: 320, y: 300
        },
        {
            name: 'Brick 3',
            width: 60, height: 30,
            mass: 45,
            surfaceFriction: 1.0,
            color: '#865e3c',
            x: 500, y: 300
        },

        // Small pieces
        {
            name: 'Tiny',
            width: 35, height: 35,
            mass: 15,
            surfaceFriction: 1.0,
            color: '#ff7800',
            x: 650, y: 200
        },
        {
            name: 'Pebble',
            width: 25, height: 25,
            mass: 10,
            surfaceFriction: 1.0,
            color: '#77767b',
            x: 580, y: 250
        },
    ];

    // Create renderer
    const renderer = new Renderer(engine, playfield);
    renderer.setupEventListeners();

    // Add shapes to engine and create visual elements
    for (const config of shapeConfigs) {
        const body = engine.addBody(config);
        renderer.createBodyElement(body, config.color);
    }

    // Populate shape info panel
    const shapeList = document.getElementById('shape-list');
    shapeList.innerHTML = shapeConfigs.map(c => {
        const previewW = Math.min(30, c.width / 2);
        const previewH = Math.min(20, c.height / 2);
        return `
        <div class="shape-item">
            <div class="shape-header">
                <span class="shape-preview" style="background: ${c.color}; width: ${previewW}px; height: ${previewH}px;"></span>
                <strong>${c.name}</strong>
            </div>
            <div class="shape-stats">
                <div>Size: <span>${c.width}×${c.height}</span></div>
                <div>Mass: <span>${c.mass}</span></div>
                <div>Grip: <span>${(c.surfaceFriction * 100).toFixed(0)}%</span></div>
            </div>
        </div>
    `}).join('');

    // Setup dev controls
    const controls = ['gravity', 'friction', 'bounceDamping', 'collisionDamping', 'minBounceRatio', 'surfaceFriction'];

    controls.forEach(name => {
        const slider = document.getElementById(name);
        const valueDisplay = document.getElementById(name + '-val');

        slider.addEventListener('input', () => {
            const value = parseFloat(slider.value);
            engine[name] = value;
            valueDisplay.textContent = value.toFixed(2);
        });
    });

    // Update bounds on resize
    window.addEventListener('resize', () => {
        const rect = playfield.getBoundingClientRect();
        engine.setBounds(rect.width, rect.height);
    });

    // Animation loop
    let lastFrameTime = performance.now();

    function gameLoop(currentTime) {
        const dt = Math.min((currentTime - lastFrameTime) / 1000, 0.05);
        lastFrameTime = currentTime;

        engine.step(dt);
        renderer.updatePositions();

        requestAnimationFrame(gameLoop);
    }

    // Status
    const resultsDiv = document.getElementById('test-results');
    resultsDiv.innerHTML = '<span class="test-pass">✓ ' + engine.bodies.length + ' shapes loaded</span>';
    setTimeout(() => { resultsDiv.style.display = 'none'; }, 3000);

    requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
